<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tibia Loot Split</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #21262d;
      --surface3:  #30363d;
      --border:    #30363d;
      --border-dim: #21262d;
      --text:      #e6edf3;
      --text-muted:#8b949e;
      --text-dim:  #6e7681;
      --green:     #39d353;
      --green-dim: #196c2e;
      --green-bg:  rgba(57,211,83,0.08);
      --green-glow:rgba(57,211,83,0.18);
      --red:       #f85149;
      --red-bg:    rgba(248,81,73,0.1);
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
      --radius: 6px;
      --radius-lg: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 56px 20px 80px;
    }

    .container {
      width: 100%;
      max-width: 540px;
    }

    header { margin-bottom: 44px; }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 28px; height: 28px;
      border: 1px solid var(--green);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
    }

    .logo-text {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .logo-text span { color: var(--green); }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    h1 em {
      font-style: normal;
      font-weight: 300;
      color: var(--text-muted);
    }

    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .player-row {
      display: grid;
      grid-template-columns: 1fr 140px 34px;
      gap: 6px;
      margin-bottom: 6px;
      align-items: center;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      font-family: var(--sans);
      padding: 9px 11px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(57,211,83,0.1);
    }

    input::placeholder { color: var(--text-dim); }

    .remove-btn {
      width: 34px; height: 36px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }

    .remove-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }
    .remove-btn:disabled { opacity: 0.2; cursor: not-allowed; }
    .remove-btn:disabled:hover { border-color: var(--border); color: var(--text-dim); background: transparent; }

    .add-btn {
      width: 100%;
      margin-top: 6px;
      padding: 8px;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      font-size: 12px;
      font-family: var(--mono);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }

    .add-btn:hover { border-color: var(--green-dim); color: var(--green); background: var(--green-bg); }

    .divider {
      border: none;
      border-top: 1px solid var(--border-dim);
      margin: 28px 0;
    }

    .loot-block {
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 16px;
      align-items: center;
    }

    .loot-desc p:first-child {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 3px;
    }

    .loot-desc p:last-child {
      font-size: 12px;
      color: var(--text-muted);
    }

    .error {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--red);
      margin-top: 10px;
    }

    .calc-btn {
      width: 100%;
      margin-top: 24px;
      padding: 11px;
      background: var(--green-bg);
      border: 1px solid var(--green-dim);
      border-radius: var(--radius);
      color: var(--green);
      font-size: 13px;
      font-family: var(--mono);
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.2s;
    }

    .calc-btn:hover {
      background: rgba(57,211,83,0.14);
      border-color: var(--green);
      box-shadow: 0 0 12px var(--green-glow);
    }

    .results { margin-top: 40px; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 24px;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }

    .metric-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .metric-value {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .player-result {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 13px 15px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: border-color 0.15s;
    }

    .player-result:hover { border-color: var(--surface3); }

    .pr-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 3px;
    }

    .pr-detail {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    .badge {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 9px;
      border-radius: var(--radius);
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .badge-receive { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-dim); }
    .badge-pay     { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(248,81,73,0.3); }
    .badge-even    { background: var(--surface2);  color: var(--text-muted); border: 1px solid var(--border); }

    .transfers-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin: 24px 0 10px;
    }

    .transfer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text);
      padding: 10px 13px;
      border: 1px solid var(--border-dim);
      border-radius: var(--radius);
      margin-bottom: 5px;
      background: var(--surface);
    }

    .transfer-arrow { color: var(--text-dim); font-size: 11px; }

    .transfer-amount {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--green);
    }

    footer {
      margin-top: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }

    .dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--green);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-row">
        <div class="logo-icon">⚔</div>
        <span class="logo-text"><span>tibia</span> / loot-split</span>
      </div>
      <h1>Loot Split <em>Calculator</em></h1>
    </header>

    <p class="section-label">// jogadores</p>
    <div id="players-list"></div>
    <button class="add-btn" onclick="addPlayer()">+ add_player()</button>

    <hr class="divider">

    <div class="loot-block">
      <div class="loot-desc">
        <p>Loot total</p>
        <p>soma de todo o loot da hunt</p>
      </div>
      <input type="number" id="loot-input" placeholder="0 gp" min="0" />
    </div>

    <div id="error-msg"></div>
    <button class="calc-btn" onclick="calculate()">→ calcular_split()</button>

    <div class="results" id="results" style="display:none;"></div>

    <footer>
      <div class="dot"></div>
      feito por Danillo Tanigushi
    </footer>
  </div>

  <script>
    let players = [
      { id: 1, name: '', waste: '' },
      { id: 2, name: '', waste: '' },
    ];
    let nextId = 3;

    function addPlayer() {
      players.push({ id: nextId++, name: '', waste: '' });
      render();
    }

    function removePlayer(id) {
      if (players.length <= 2) return;
      players = players.filter(p => p.id !== id);
      render();
    }

    function updateField(id, field, val) {
      const p = players.find(p => p.id === id);
      if (p) p[field] = val;
    }

    function render() {
      const list = document.getElementById('players-list');
      list.innerHTML = '';
      players.forEach(p => {
        const row = document.createElement('div');
        row.className = 'player-row';
        row.innerHTML = `
          <input type="text" placeholder="Nome do jogador" value="${p.name}"
            oninput="updateField(${p.id},'name',this.value)" />
          <input type="number" placeholder="Waste (gp)" value="${p.waste}" min="0"
            oninput="updateField(${p.id},'waste',this.value)" />
          <button class="remove-btn" onclick="removePlayer(${p.id})"
            ${players.length <= 2 ? 'disabled' : ''} title="Remover">×</button>
        `;
        list.appendChild(row);
      });
    }

    function fmt(n) {
      return Math.round(Math.abs(n)).toLocaleString('pt-BR') + ' gp';
    }

    function calculate() {
      const errEl = document.getElementById('error-msg');
      errEl.innerHTML = '';

      const loot = parseFloat(document.getElementById('loot-input').value) || 0;
      if (loot <= 0) {
        errEl.innerHTML = '<p class="error">// erro: insira o loot total da hunt</p>';
        return;
      }

      const valid = players.filter(p => p.name.trim() !== '');
      if (valid.length < 2) {
        errEl.innerHTML = '<p class="error">// erro: adicione pelo menos 2 jogadores com nome</p>';
        return;
      }

      const totalWaste = valid.reduce((s, p) => s + (parseFloat(p.waste) || 0), 0);
      const netProfit = loot - totalWaste; 
      const share = netProfit / valid.length; 

    const withBalance = valid.map(p => {
      const waste = parseFloat(p.waste) || 0;
      const balance = waste + share; 
      return { ...p, waste, share, balance };
      });

      let html = `
        <p class="section-label">// resultado</p>
        <div class="summary-grid">
          <div class="metric">
            <div class="metric-label">Loot total</div>
            <div class="metric-value">${Math.round(loot).toLocaleString('pt-BR')}</div>
          </div>
          <div class="metric">
            <div class="metric-label">Waste total</div>
            <div class="metric-value">${Math.round(totalWaste).toLocaleString('pt-BR')}</div>
          </div>
          <div class="metric">
            <div class="metric-label">Profit líquido</div>
            <div class="metric-value">${Math.round(netProfit).toLocaleString('pt-BR')}</div>
          </div>
        </div>
      `;

      withBalance.forEach(p => {
        const badgeClass = p.balance > 0 ? 'badge-receive' : p.balance < 0 ? 'badge-pay' : 'badge-even';
        const sign = p.balance > 0 ? '+ ' : p.balance < 0 ? '− ' : '';
        const label = p.balance === 0 ? 'zerado' : sign + fmt(p.balance);
        html += `
          <div class="player-result">
            <div>
              <p class="pr-name">${p.name}</p>
              <p class="pr-detail">
                share: ${Math.round(share).toLocaleString('pt-BR')} &nbsp;·&nbsp;
                waste: ${Math.round(p.waste).toLocaleString('pt-BR')}
              </p>
            </div>
            <span class="badge ${badgeClass}">${label}</span>
          </div>
        `;
      });

      const receivers = withBalance.filter(p => p.balance > 0).map(p => ({ ...p, rem: p.balance }));
      const payers    = withBalance.filter(p => p.balance < 0).map(p => ({ ...p, rem: -p.balance }));

      const transfers = [];
      let ri = 0, pi = 0;
      while (ri < receivers.length && pi < payers.length) {
        const amt = Math.min(receivers[ri].rem, payers[pi].rem);
        if (amt > 0) transfers.push({ from: payers[pi].name, to: receivers[ri].name, amount: amt });
        receivers[ri].rem -= amt;
        payers[pi].rem -= amt;
        if (receivers[ri].rem < 1) ri++;
        if (payers[pi].rem < 1) pi++;
      }

      if (transfers.length > 0) {
        html += `<p class="transfers-label">// transferências</p>`;
        transfers.forEach(t => {
          html += `
            <div class="transfer-item">
              <span>${t.from}</span>
              <span class="transfer-arrow">→</span>
              <span>${t.to}</span>
              <span class="transfer-amount">${Math.round(t.amount).toLocaleString('pt-BR')} gp</span>
            </div>
          `;
        });
      }

      const resultsEl = document.getElementById('results');
      resultsEl.innerHTML = html;
      resultsEl.style.display = 'block';
      resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    render();
  </script>
</body>
</html>
